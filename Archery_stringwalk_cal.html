
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barebow String Walk Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #000;
            color: #0f0;
            overflow: hidden;
        }

        /* Views */
        #start-view, #camera-view, #distance-view {
            display: none;
            width: 100vw;
            height: 100vh;
            flex-direction: column;
        }

        #start-view {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            z-index: 50;
        }
        
        #start-view h1 { margin-bottom: 20px; font-size: 24px; }

        /* Camera Background */
        #camera-feed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -1;
        }

        /* Viewfinder Crosshair */
        .crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            z-index: 10;
            pointer-events: none;
        }
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background-color: #0f0;
            box-shadow: 0 0 5px #000;
        }
        .crosshair::before { top: 29px; left: 0; width: 60px; height: 2px; }
        .crosshair::after { left: 29px; top: 0; height: 60px; width: 2px; }

        /* Overlay UI panels */
        .panel {
            background-color: rgba(0, 0, 0, 0.85);
            border: 2px solid #0f0;
            border-radius: 12px;
            padding: 15px;
            margin: 15px;
            z-index: 20;
            position: relative;
        }

        .camera-panel {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: center;
        }

        .distance-panel {
            margin: auto 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .angle-display {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        /* Range Slider Styling */
        .slider-container {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
        }
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            margin: 15px 0;
            background: transparent;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #050;
            border-radius: 5px;
            border: 1px solid #0f0;
        }
        input[type="range"]::-webkit-slider-thumb {
            height: 30px;
            width: 30px;
            border-radius: 50%;
            background: #0f0;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -12px;
            box-shadow: 0 0 10px #000;
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            background-color: #0f0;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
        }
        button.secondary {
            background-color: #333;
            color: #0f0;
            border: 1px solid #0f0;
        }
        button:active { filter: brightness(0.8); }

        /* Results Display */
        .results {
            font-size: 1.1rem;
            line-height: 1.5;
            background: #111;
            padding: 15px;
            border-radius: 8px;
        }
        .results .highlight {
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
            background: #005500;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            text-align: center;
        }
        .warning {
            color: #f00;
            font-weight: bold;
            text-align: center;
            margin-top: 10px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <!-- 1. Start Screen -->
    <div id="start-view">
        <h1>Barebow String Walk Calculator</h1>
        <p style="margin-bottom: 30px;">This app requires access to your camera and device orientation sensors to calculate line-of-sight angles.</p>
        <button id="start-btn" onclick="initApp()">Start Camera & Sensors</button>
    </div>

    <!-- 2. Camera & Angle View -->
    <div id="camera-view">
        <video id="camera-feed" autoplay playsinline></video>
        <div class="crosshair"></div>
        
        <div class="panel camera-panel">
            <div>TARGET ELEVATION</div>
            <div class="angle-display"><span id="live-angle">0</span>&deg;</div>
            <button onclick="lockAngle()">Lock Angle</button>
            <button class="secondary" onclick="skipAngle()">Skip (Use 0&deg;)</button>
        </div>
    </div>

    <!-- 3. Distance & Results View -->
    <div id="distance-view">
        <div class="panel distance-panel">
            <div class="info-row" style="font-size: 1.2rem; color: #aaa;">
                <span>Locked Angle:</span>
                <strong><span id="locked-angle-display">0</span>&deg;</strong>
            </div>

            <div class="slider-container">
                <div>Distance: <span id="dist-display-val">20</span> yds</div>
                <input type="range" id="distance-slider" min="5" max="80" value="20" oninput="updateDistance()">
            </div>
            
            <div id="results-container" class="results">
                <div class="info-row">
                    <span>Effective Dist ($d_{eff}$):</span>
                    <strong><span id="res-deff">0</span> yds</strong>
                </div>
                <div class="info-row">
                    <span>Chin Crawl:</span>
                    <strong><span id="res-chin">0</span></strong>
                </div>
                <div class="info-row">
                    <span>Lip Crawl:</span>
                    <strong><span id="res-lip">0</span></strong>
                </div>
                <div id="res-recommendation" class="highlight"></div>
            </div>

            <button class="secondary" onclick="goBackToCamera()">Back to Camera</button>
        </div>
    </div>

    <script>
        let currentAngle = 0;
        let isCameraViewActive = false;
        let cameraStream = null;
        
        // --- Initialization & Permissions ---
        async function initApp() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                    } else {
                        alert("Sensor permission denied.");
                    }
                } catch (err) {
                    console.error("Orientation error:", err);
                }
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }

            document.getElementById('start-view').style.display = 'none';
            await startCamera();
        }

        // --- Camera Management ---
        async function startCamera() {
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: "environment" } }
                });
                document.getElementById('camera-feed').srcObject = cameraStream;
                
                document.getElementById('distance-view').style.display = 'none';
                document.getElementById('camera-view').style.display = 'flex';
                isCameraViewActive = true;
            } catch (err) {
                console.error("Camera error:", err);
                alert("Camera access denied or unavailable.");
            }
        }

        function stopCamera() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
            isCameraViewActive = false;
        }

        // --- Angle Sensor Logic ---
        function handleOrientation(event) {
            if (!isCameraViewActive || event.beta === null) return;
            
            let rawBeta = event.beta; 
            let angle = 90 - rawBeta; 
            currentAngle = Math.round(angle);
            
            document.getElementById('live-angle').innerText = currentAngle;
        }

        // --- View Transitions ---
        function lockAngle() {
            showDistanceView(currentAngle);
        }

        function skipAngle() {
            showDistanceView(0);
        }

        function showDistanceView(angleToUse) {
            currentAngle = angleToUse;
            stopCamera();
            
            document.getElementById('camera-view').style.display = 'none';
            document.getElementById('distance-view').style.display = 'flex';
            
            document.getElementById('locked-angle-display').innerText = currentAngle;
            
            // Default to 20 yards on entry
            document.getElementById('distance-slider').value = 20;
            updateDistance(); 
        }

        function goBackToCamera() {
            startCamera();
        }

        // --- Distance & Calculations ---
        function updateDistance() {
            const distValue = document.getElementById('distance-slider').value;
            document.getElementById('dist-display-val').innerText = distValue;
            calculateCrawl(parseFloat(distValue));
        }

        function calculateCrawl(distance) {
            // Convert angle to radians for Math.cos
            const angleRad = currentAngle * (Math.PI / 180);

            // Step 1: Effective Distance
            const d_eff = distance * Math.cos(angleRad);

            // Step 2: Anchor Formulas
            const s_chin = -0.01 * (d_eff * d_eff) + 0.3 * d_eff + 12.5;
            const s_lip  = -0.01 * (d_eff * d_eff) - 0.15 * d_eff + 11.5;

            // Update UI with base values
            document.getElementById('res-deff').innerText = d_eff.toFixed(1);
            document.getElementById('res-chin').innerText = s_chin.toFixed(1) + " units";
            document.getElementById('res-lip').innerText = s_lip.toFixed(1) + " units";

            // Step 3: Recommendation Logic
            const recDiv = document.getElementById('res-recommendation');
            recDiv.className = '';

            let validAnchors = [];
            if (s_chin >= 0) validAnchors.push({ name: "Chin", value: s_chin });
            if (s_lip >= 0)  validAnchors.push({ name: "Lip", value: s_lip });

            if (validAnchors.length === 0) {
                // Both negative
                recDiv.innerHTML = "Warning: Target exceeds point-on distance.";
                recDiv.className = 'warning';
            } else {
                // Find smallest positive value
                validAnchors.sort((a, b) => a.value - b.value);
                const best = validAnchors[0];
                
                recDiv.innerHTML = `Recommended: ${best.name} Anchor<br>Crawl: ${best.value.toFixed(1)} units`;
                recDiv.className = 'highlight';
            }
        }
    </script>
</body>
</html>
