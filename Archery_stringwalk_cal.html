<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Barebow String Walk Calculator</title>
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --panel-bg: rgba(18, 18, 22, 0.75);
            --neon: #00ff66;
            --neon-dim: rgba(0, 255, 102, 0.15);
            --text-main: #ffffff;
            --text-muted: #a0a0a5;
            --danger: #ff3366;
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            /* Fallback for browsers that don't support dvh */
            height: 100vh; 
            height: 100dvh;
        }

        /* Views */
        #start-view, #camera-view, #distance-view {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
        }

        /* Start Screen */
        #start-view {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            text-align: center;
            z-index: 50;
            background: radial-gradient(circle at center, #1a1a24 0%, var(--bg-dark) 100%);
        }
        
        #start-view h1 { 
            margin-bottom: 8px; 
            font-size: 28px; 
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--neon);
        }

        .signature {
            font-size: 0.95rem;
            color: var(--neon);
            opacity: 0.7;
            font-style: italic;
            margin-bottom: 30px;
        }

        #start-view p.description {
            color: var(--text-muted);
            margin-bottom: 40px;
            line-height: 1.6;
            font-size: 16px;
        }

        /* Camera Background */
        #camera-feed {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        /* Modern Crosshair */
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            z-index: 10;
            pointer-events: none;
        }
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background-color: var(--neon);
            box-shadow: 0 0 8px rgba(0, 255, 102, 0.8);
            border-radius: 2px;
        }
        .crosshair::before { top: 34px; left: 0; width: 70px; height: 2px; }
        .crosshair::after { left: 34px; top: 0; height: 70px; width: 2px; }
        .crosshair-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 8px; height: 8px;
            border: 2px solid var(--neon);
            border-radius: 50%;
        }

        /* Glassmorphism Panels */
        .panel {
            background-color: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        /* Anchored to bottom to prevent below-the-fold issues */
        .camera-panel {
            position: absolute;
            bottom: env(safe-area-inset-bottom, 20px);
            left: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: center;
        }

        .distance-panel {
            margin: auto 15px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .panel-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .angle-display {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--neon);
            text-shadow: 0 0 15px var(--neon-dim);
            line-height: 1;
            margin: 5px 0 10px 0;
        }

        /* Modern Range Slider */
        .slider-container {
            text-align: center;
        }
        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 15px;
        }
        .slider-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--neon);
        }
        .slider-label {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 5px;
        }
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            height: 30px; /* larger touch target */
        }
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        input[type="range"]::-webkit-slider-thumb {
            height: 28px;
            width: 28px;
            border-radius: 50%;
            background: var(--neon);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -11px;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.5);
            transition: transform 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb:active {
            transform: scale(1.15);
        }

        /* Buttons */
        button {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            background-color: var(--neon);
            color: #000;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button.secondary {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        button:active { 
            transform: scale(0.97); 
            opacity: 0.9;
        }

        /* Results Display */
        .results {
            background: rgba(0, 0, 0, 0.4);
            padding: 18px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 1.1rem;
            color: var(--text-muted);
        }
        .info-row strong {
            color: var(--text-main);
            font-size: 1.2rem;
        }
        .info-row:last-of-type { margin-bottom: 0; }
        
        .highlight {
            font-size: 1.2rem;
            font-weight: 700;
            color: #000;
            background: var(--neon);
            padding: 14px;
            border-radius: 10px;
            margin-top: 18px;
            text-align: center;
            box-shadow: 0 4px 15px var(--neon-dim);
        }
        .warning {
            color: var(--danger);
            font-weight: 700;
            background: rgba(255, 51, 102, 0.1);
            border: 1px solid rgba(255, 51, 102, 0.3);
            padding: 14px;
            border-radius: 10px;
            text-align: center;
            margin-top: 18px;
        }
    </style>
</head>
<body>

    <!-- 1. Start Screen -->
    <div id="start-view">
        <div>
            <h1>BAREBOW<br>STRINGWALKER</h1>
            <div class="signature">by Rohit Das</div>
            <p class="description">Allow camera and motion sensor access to calculate precise line-of-sight angles.</p>
            <button id="start-btn" onclick="initApp()">Start Camera & Sensors</button>
        </div>
    </div>

    <!-- 2. Camera & Angle View -->
    <div id="camera-view">
        <video id="camera-feed" autoplay playsinline></video>
        <div class="crosshair"><div class="crosshair-center"></div></div>
        
        <div class="panel camera-panel">
            <div class="panel-label">Target Elevation</div>
            <div class="angle-display"><span id="live-angle">0</span>&deg;</div>
            <button onclick="lockAngle()">Lock Angle</button>
            <button class="secondary" onclick="skipAngle()">Skip (Use 0&deg;)</button>
        </div>
    </div>

    <!-- 3. Distance & Results View -->
    <div id="distance-view">
        <div class="panel distance-panel">
            
            <div class="info-row" style="border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;">
                <span>Locked Angle</span>
                <strong style="color: var(--neon);"><span id="locked-angle-display">0</span>&deg;</strong>
            </div>

            <div class="slider-container">
                <div class="slider-header">
                    <span class="slider-label">Target Distance</span>
                    <span class="slider-value"><span id="dist-display-val">20</span><span style="font-size: 1rem; color: var(--text-muted); margin-left: 4px;">yds</span></span>
                </div>
                <!-- Updated max distance to 60 -->
                <input type="range" id="distance-slider" min="5" max="60" value="20" oninput="updateDistance()">
            </div>
            
            <div id="results-container" class="results">
                <div class="info-row">
                    <span>Effective Dist (d<sub>eff</sub>)</span>
                    <strong><span id="res-deff">0</span> yds</strong>
                </div>
                <div class="info-row">
                    <span>Chin Crawl</span>
                    <strong><span id="res-chin">0</span></strong>
                </div>
                <div class="info-row">
                    <span>Lip Crawl</span>
                    <strong><span id="res-lip">0</span></strong>
                </div>
                <div id="res-recommendation" class="highlight"></div>
            </div>

            <button class="secondary" onclick="goBackToCamera()">Back to Camera</button>
        </div>
    </div>

    <script>
        let currentAngle = 0;
        let isCameraViewActive = false;
        let cameraStream = null;
        
        // --- Initialization & Permissions ---
        async function initApp() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                    } else {
                        alert("Sensor permission denied. The app will default to 0 degrees.");
                    }
                } catch (err) {
                    console.error("Orientation error:", err);
                }
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }

            document.getElementById('start-view').style.display = 'none';
            await startCamera();
        }

        // --- Camera Management ---
        async function startCamera() {
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: "environment" } }
                });
                document.getElementById('camera-feed').srcObject = cameraStream;
                
                document.getElementById('distance-view').style.display = 'none';
                document.getElementById('camera-view').style.display = 'flex';
                isCameraViewActive = true;
            } catch (err) {
                console.error("Camera error:", err);
                alert("Camera access denied. You can still use the manual distance calculator.");
                skipAngle(); // fallback if camera fails
            }
        }

        function stopCamera() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
            isCameraViewActive = false;
        }

        // --- Angle Sensor Logic ---
        function handleOrientation(event) {
            if (!isCameraViewActive || event.beta === null) return;
            
            let rawBeta = event.beta; 
            let angle = 90 - rawBeta; 
            currentAngle = Math.round(angle);
            
            document.getElementById('live-angle').innerText = currentAngle;
        }

        // --- View Transitions ---
        function lockAngle() {
            showDistanceView(currentAngle);
        }

        function skipAngle() {
            showDistanceView(0);
        }

        function showDistanceView(angleToUse) {
            currentAngle = angleToUse;
            stopCamera();
            
            document.getElementById('camera-view').style.display = 'none';
            document.getElementById('distance-view').style.display = 'flex';
            
            document.getElementById('locked-angle-display').innerText = currentAngle;
            
            // Set slider to default 20 yards
            document.getElementById('distance-slider').value = 20;
            updateDistance(); 
        }

        function goBackToCamera() {
            startCamera();
        }

        // --- Distance & Calculations ---
        function updateDistance() {
            const distValue = document.getElementById('distance-slider').value;
            document.getElementById('dist-display-val').innerText = distValue;
            calculateCrawl(parseFloat(distValue));
        }

        function calculateCrawl(distance) {
            const angleRad = currentAngle * (Math.PI / 180);

            // Step 1: Effective Distance
            const d_eff = distance * Math.cos(angleRad);

            // Step 2: Anchor Formulas
            const s_chin = -0.01 * (d_eff * d_eff) + 0.3 * d_eff + 12.5;
            const s_lip  = -0.01 * (d_eff * d_eff) - 0.15 * d_eff + 11.5;

            // Update UI with base values
            document.getElementById('res-deff').innerText = d_eff.toFixed(1);
            document.getElementById('res-chin').innerText = s_chin.toFixed(1);
            document.getElementById('res-lip').innerText = s_lip.toFixed(1);

            // Step 3: Recommendation Logic
            const recDiv = document.getElementById('res-recommendation');
            recDiv.className = '';

            let validAnchors = [];
            if (s_chin >= 0) validAnchors.push({ name: "Chin", value: s_chin });
            if (s_lip >= 0)  validAnchors.push({ name: "Lip", value: s_lip });

            if (validAnchors.length === 0) {
                // Both negative
                recDiv.innerHTML = "Target exceeds point-on distance.";
                recDiv.className = 'warning';
            } else {
                // Find smallest positive value
                validAnchors.sort((a, b) => a.value - b.value);
                const best = validAnchors[0];
                
                recDiv.innerHTML = `Recommended: ${best.name} Anchor<br><span style="font-size: 1.5rem; margin-top: 5px; display: block;">${best.value.toFixed(1)} units</span>`;
                recDiv.className = 'highlight';
            }
        }
    </script>
</body>
</html>
